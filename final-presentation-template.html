<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Final Presentation Template</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@700;800;900&display=swap');
:root {
  --teal: #0f7777;
  --teal-2: #2f9f9a;
  --blue: #2d64a0;
  --sky: #9ee3ef;
  --cream: #f7f2c7;
  --yellow: #ffc857;
  --orange: #ff9f1c;
  --ink: #17313b;
  --muted: #5e7580;
  --white: #ffffff;
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: "Baloo 2", "Comic Sans MS", "Nunito", Arial, sans-serif;
  color: var(--ink);
  background:
    radial-gradient(circle at 8% 10%, rgba(255,255,255,.75), transparent 18rem),
    linear-gradient(120deg, #fbf0b5 0%, #cdebd1 36%, #85d9ed 100%);
}
a { color: inherit; }
.page-shell { min-height: 100vh; }
.hero {
  min-height: 78vh;
  padding: 44px clamp(22px, 5vw, 78px);
  display: grid;
  grid-template-columns: minmax(0, 1.05fr) minmax(280px, .75fr);
  gap: 38px;
  align-items: center;
  position: relative;
  overflow: hidden;
}
.hero::after, .section::after {
  content: "";
  position: absolute;
  inset: auto -8% -18% auto;
  width: 36vw;
  aspect-ratio: 1;
  border-radius: 50%;
  background: rgba(255,255,255,.18);
  pointer-events: none;
}
.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin: 0 0 16px;
  padding: 9px 14px;
  border-radius: 999px;
  background: rgba(15,119,119,.14);
  color: var(--teal);
  font-weight: 900;
  letter-spacing: 0;
}
h1, h2, h3 {
  letter-spacing: 0;
  margin: 0;
  font-family: "Nunito", "Baloo 2", Arial, sans-serif;
  font-weight: 900;
}
h1 {
  max-width: 920px;
  font-size: clamp(46px, 6vw, 84px);
  line-height: .98;
  color: #0c6f6c;
}
.hero-copy {
  max-width: 820px;
  margin: 22px 0 0;
  font-size: clamp(20px, 2vw, 30px);
  line-height: 1.35;
  font-weight: 700;
}
.hero-panel {
  background: rgba(255,255,255,.82);
  border: 4px solid rgba(15,119,119,.22);
  border-radius: 8px;
  padding: 22px;
  box-shadow: 0 20px 44px rgba(13,82,94,.18);
}
.hero-panel h2 { font-size: 26px; color: var(--blue); margin-bottom: 12px; }
.quick-links, .button-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 44px;
  padding: 12px 16px;
  border-radius: 8px;
  background: var(--blue);
  color: #fff;
  text-decoration: none;
  font-weight: 900;
  border: 0;
  cursor: pointer;
}
.button.secondary { background: var(--teal-2); }
.button.light { background: #fff; color: var(--teal); border: 2px solid rgba(15,119,119,.32); }
.section {
  position: relative;
  padding: 54px clamp(18px, 4vw, 70px);
}
.section-head {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  align-items: end;
  margin-bottom: 24px;
}
.section h2 { font-size: clamp(32px, 4vw, 54px); color: var(--teal); }
.section-note { max-width: 760px; color: var(--muted); font-size: 19px; font-weight: 700; line-height: 1.45; }
.cards {
  display: grid;
  grid-template-columns: repeat(5, minmax(210px, 1fr));
  gap: 16px;
}
.day-card {
  background: rgba(255,255,255,.86);
  border: 3px solid rgba(15,119,119,.25);
  border-radius: 8px;
  padding: 18px;
  box-shadow: 0 12px 28px rgba(23,49,59,.12);
}
.day-card h3 { font-size: 24px; color: var(--blue); margin-bottom: 8px; }
.day-card p, .day-card li { font-size: 16px; line-height: 1.38; }
.duration {
  display: inline-flex;
  padding: 6px 10px;
  border-radius: 999px;
  background: #fff1a7;
  color: #8a5700;
  font-weight: 900;
  margin: 10px 0;
}
.resource-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  gap: 14px;
}
.resource-block {
  background: rgba(255,255,255,.86);
  border: 2px solid rgba(15,119,119,.22);
  border-radius: 8px;
  padding: 18px;
}
.resource-block h3 { font-size: 22px; color: var(--teal); margin-bottom: 10px; }
.mini-table {
  width: 100%;
  border-collapse: collapse;
  background: rgba(255,255,255,.9);
  border-radius: 8px;
  overflow: hidden;
}
.mini-table th, .mini-table td {
  border: 2px solid rgba(15,119,119,.25);
  padding: 12px;
  text-align: left;
  vertical-align: top;
  font-size: 18px;
  line-height: 1.26;
}
.mini-table th { background: #167b78; color: white; }
.footer {
  padding: 26px clamp(18px, 4vw, 70px) 44px;
  color: var(--muted);
  font-weight: 800;
}
.deck-body {
  background: #dff5f5;
  overflow: hidden;
}
.deck-nav {
  position: fixed;
  right: 18px;
  bottom: 18px;
  z-index: 20;
  display: flex;
  gap: 8px;
  align-items: center;
  background: rgba(255,255,255,.85);
  padding: 8px;
  border-radius: 8px;
  box-shadow: 0 10px 24px rgba(0,0,0,.16);
}
.deck-nav button {
  border: 0;
  border-radius: 8px;
  background: var(--blue);
  color: white;
  width: 42px;
  height: 38px;
  font-size: 20px;
  font-weight: 900;
  cursor: pointer;
}
.slide-counter { min-width: 68px; text-align: center; font-weight: 900; color: var(--teal); }
.slide {
  width: 100vw;
  height: 100vh;
  display: none;
  padding: 42px 54px;
  background:
    radial-gradient(circle at 92% 12%, rgba(255,255,255,.55), transparent 16rem),
    linear-gradient(120deg, #f7f2c7 0%, #c9edd9 36%, #99e1f2 100%);
  position: relative;
  overflow: hidden;
}
.slide.active { display: grid; }
.slide.layout-title {
  grid-template-columns: minmax(0, 1.1fr) minmax(300px, .72fr);
  align-items: center;
  gap: 36px;
}
.slide.layout-content { grid-template-rows: auto 1fr; gap: 22px; }
.slide-kicker {
  font-size: 22px;
  color: var(--blue);
  font-weight: 900;
  margin-bottom: 10px;
}
.slide h1 { font-size: clamp(54px, 7vw, 94px); color: #0b716e; }
.slide h2 { font-size: clamp(38px, 4.6vw, 66px); color: #0b716e; }
.subtitle {
  font-size: clamp(24px, 2.5vw, 36px);
  line-height: 1.28;
  font-weight: 850;
  margin-top: 18px;
}
.tag-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 22px; }
.tag {
  display: inline-flex;
  padding: 9px 13px;
  border-radius: 999px;
  background: var(--yellow);
  color: #633f00;
  font-weight: 900;
  font-size: 18px;
}
.slide-panel, .note-box, .image-card {
  background: rgba(255,255,255,.9);
  border: 4px solid rgba(15,119,119,.28);
  border-radius: 8px;
  box-shadow: 0 14px 32px rgba(23,49,59,.13);
}
.slide-panel { padding: 26px; }
.slide-panel h3 { font-size: 30px; color: var(--blue); margin-bottom: 14px; }
.slide-panel p, .slide-panel li {
  font-size: clamp(26px, 2.25vw, 34px);
  line-height: 1.23;
  font-weight: 760;
}
.slide-panel ul { margin: 0; padding-left: 26px; }
.two-col {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  gap: 24px;
  align-items: stretch;
}
.three-col {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 18px;
}
.note-box {
  padding: 18px 20px;
  background: #2767a5;
  color: white;
}
.note-box h3 { color: white; font-size: 28px; margin-bottom: 10px; }
.note-box li, .note-box p { font-size: 23px; line-height: 1.35; font-weight: 800; }
.image-card {
  padding: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
}
.image-card img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  border-radius: 6px;
}
.time-chip {
  position: absolute;
  top: 26px;
  right: 34px;
  background: #ffcf5c;
  color: #674100;
  padding: 9px 14px;
  border-radius: 999px;
  font-weight: 900;
  font-size: 18px;
}
.big-list {
  display: grid;
  gap: 14px;
}
.big-item {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 14px;
  align-items: start;
  background: rgba(255,255,255,.9);
  border: 3px solid rgba(15,119,119,.2);
  border-radius: 8px;
  padding: 15px 18px;
  font-size: clamp(26px, 2.25vw, 35px);
  font-weight: 850;
}
.num-dot {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: var(--orange);
  color: white;
  font-weight: 1000;
}
.worksheet-page {
  display: grid;
  grid-template-columns: 230px 1fr;
  gap: 20px;
  align-items: start;
}
.worksheet-list { position: sticky; top: 10px; display: grid; gap: 8px; }
.worksheet-preview {
  background: rgba(255,255,255,.86);
  border: 2px solid rgba(15,119,119,.22);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 18px;
}
.worksheet-preview img { width: 100%; display: block; border-radius: 6px; }
.wheel-page {
  min-height: 100vh;
  display: grid;
  grid-template-columns: minmax(280px, 520px) minmax(300px, 1fr);
  gap: 34px;
  align-items: center;
  padding: 42px;
}
.wheel-wrap { position: relative; width: min(80vw, 520px); aspect-ratio: 1; margin: auto; }
#wheelCanvas { width: 100%; height: 100%; filter: drop-shadow(0 18px 34px rgba(19,84,94,.25)); }
.pointer {
  position: absolute;
  right: -20px;
  top: 50%;
  transform: translateY(-50%) rotate(180deg);
  width: 0;
  height: 0;
  border-top: 24px solid transparent;
  border-bottom: 24px solid transparent;
  border-left: 44px solid #17313b;
}
.result-box {
  background: white;
  border: 4px solid rgba(15,119,119,.28);
  border-radius: 8px;
  padding: 24px;
}
.result-text { font-size: 52px; color: var(--teal); font-weight: 1000; margin: 12px 0 18px; }
.prep-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
}
.prep-card {
  background: rgba(255,255,255,.92);
  border: 3px solid rgba(15,119,119,.24);
  border-radius: 8px;
  padding: 18px 20px;
  min-height: 148px;
}
.prep-card h3 {
  color: var(--blue);
  font-size: 30px;
  margin-bottom: 8px;
}
.prep-card p {
  margin: 0;
  font-size: clamp(25px, 2vw, 32px);
  line-height: 1.2;
  font-weight: 800;
}
.example-box {
  background: #fff7cf;
  border: 3px solid rgba(255,159,28,.42);
  border-radius: 8px;
  padding: 18px 20px;
}
.example-box h3 {
  color: #945c00;
  font-size: 30px;
  margin-bottom: 8px;
}
.source-note {
  position: absolute;
  left: 54px;
  bottom: 22px;
  max-width: calc(100% - 108px);
  color: #5b6f78;
  font-size: 15px;
  font-weight: 800;
}
.test-shell {
  min-height: 100vh;
  padding: 36px clamp(16px, 4vw, 64px);
  background: linear-gradient(120deg, #fbf0b5 0%, #cdebd1 42%, #93ddee 100%);
}
.test-card {
  max-width: 980px;
  margin: 0 auto 16px;
  background: rgba(255,255,255,.92);
  border: 3px solid rgba(15,119,119,.26);
  border-radius: 8px;
  padding: 22px;
  box-shadow: 0 14px 30px rgba(23,49,59,.12);
}
.form-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
}
.field label {
  display: block;
  color: var(--blue);
  font-weight: 900;
  font-size: 18px;
  margin-bottom: 6px;
}
.field input, .field select {
  width: 100%;
  min-height: 48px;
  border: 2px solid rgba(15,119,119,.32);
  border-radius: 8px;
  padding: 10px 12px;
  font: 800 19px "Baloo 2", "Comic Sans MS", Arial, sans-serif;
  color: var(--ink);
  background: #fff;
}
.question-card {
  display: grid;
  gap: 10px;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 2px dashed rgba(15,119,119,.22);
}
.question-card h3 { color: var(--teal); font-size: 24px; }
.option-label {
  display: block;
  padding: 10px 12px;
  border: 2px solid rgba(15,119,119,.18);
  border-radius: 8px;
  background: #fff;
  font-size: 19px;
  font-weight: 800;
}
.option-label input { margin-right: 8px; }
.status-box {
  display: none;
  margin-top: 14px;
  padding: 14px;
  border-radius: 8px;
  font-weight: 900;
}
.status-box.ok { display: block; background: #dff8da; color: #246326; }
.status-box.warn { display: block; background: #fff2ba; color: #7a5100; }
.status-box.err { display: block; background: #ffe0dc; color: #8d2b1c; }
@media (max-width: 980px) {
  .hero, .cards, .two-col, .three-col, .worksheet-page, .wheel-page, .prep-grid, .form-grid { grid-template-columns: 1fr; }
  .slide { overflow: auto; height: auto; min-height: 100vh; }
}
@media print {
  @page { size: 16in 9in; margin: 0; }
  body.deck-body { background: white; }
  .deck-nav { display: none; }
  .slide { display: grid !important; width: 16in; height: 9in; page-break-after: always; overflow: hidden; }
}
</style>
</head>
<body class="">

<main class="section">
  <div class="section-head">
    <div><p class="eyebrow">Day 5</p><h2>Final Presentation Template</h2></div>
    <p class="section-note">Siswa menggunakan template ini untuk mempresentasikan produk/foto produk, nama produk, brand, slogan, logo, dan konsep kemasan.</p>
  </div>
  <div class="worksheet-preview"><img src="final-presentation.png" alt="Final Presentation Template"></div>
</main>

</body>
</html>
